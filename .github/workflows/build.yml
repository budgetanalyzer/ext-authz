name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        shell: bash
        run: |
          set -euo pipefail

          unformatted="$(gofmt -l .)"
          if [[ -n "${unformatted}" ]]; then
            echo "Go files need gofmt:" >&2
            echo "${unformatted}" >&2
            exit 1
          fi

      - name: Run tests
        run: go test ./...

      - name: Build Docker image
        run: docker build -t ext-authz:ci .
